version: '3.8'

networks:
  internal-network:
    name: internal-network
    external: true

services:
  chatbot-api:
    build: .
    hostname: chatbot-api
    container_name: chatbot-api
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
    restart: always
    env_file:
      - .env
    environment:
      - DEBUG=False
    volumes:
      - .:/usr/src/app/
      - checkpointer_data:/data/checkpointer
    ports:
      - 8000:8000
    networks:
      - internal-network

  qdrant-db:
    image: qdrant/qdrant:latest
    hostname: qdrant-db
    container_name: qdrant-db
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - qdrant_volume:/qdrant/storage
    networks:
      - internal-network

configs:
  qdrant_config:
    content: |
      log_level: INFO

volumes:
  checkpointer_data:
  qdrant_volume:
