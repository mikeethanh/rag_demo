version: "3.9"

services:
  chatbot-ui-next:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - internal-network
    restart: unless-stopped

networks:
  internal-network:
    external: true
